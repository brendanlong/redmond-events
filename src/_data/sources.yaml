# Direct-fetch event sources — calendars and web pages the agent pulls itself.
#
# This is SEPARATE from Lion Reader. RSS feeds and email newsletters live in the
# Lion Reader account (read via the MCP). This file is only for sources that
# aren't in Lion Reader: public .ics calendars and scrape-only web pages.
#
# Each entry:
#   - name:   human label (used as the source/provenance name)
#     type:   ics | web
#     url:    the calendar (.ics) or page URL
#     region: walk | eastside | seattle | other   (optional hint; agent still judges)
#     tags:   default tags to consider          (optional)
#
# `.ics` sources are parsed by `npm run fetch:ics` (expands recurring events).
# `web` sources are fetched and read by the agent directly (see AGENT.md).

sources:
  # Gearhouse — outdoor/social club calendar (hikes, paddleboarding, climbing,
  # board-game & jazz nights, cookouts). Mixed locations across Seattle/Eastside,
  # so no region hint — the agent judges distance per event.
  - name: "Gearhouse"
    type: ics
    url: "webcal://api.eventcalendarapp.com/widget-subscription/14149/3dfbd18c-b187-4a4b-b7c7-680c1b827f20?limit=750"

  # events12.com Seattle — a curated monthly "things to do" listings page. No feed,
  # so the agent fetches and reads it directly (type: web). Greater-Seattle scope,
  # so most of it is the higher-bar drive tier; surface the standouts.
  - name: "events12.com — Seattle"
    type: web
    url: "https://www.events12.com/seattle/"

  # Marymoor Live — the official summer concert series lineup at Marymoor Park.
  # Genuinely walk-distance from downtown Redmond, so basically every show clears
  # the distance bar; judge each on music fit per "concert series -> one article
  # per show" in AGENT.md. Discovered 2026-07-05 while cross-checking the
  # "Marymoor Live Concerts" teaser in the Experience Redmond newsletter.
  - name: "Marymoor Live"
    type: web
    url: "https://www.marymoorlive.com/"
    region: walk
    tags: [music, outdoor]

  # Redmond Town Center — the events page for downtown Redmond's own shopping/
  # entertainment center (weekly Exotics car show, Redmond Arts Festival, etc).
  # Walk distance for our readers. Added 2026-07-05.
  - name: "Redmond Town Center"
    type: web
    url: "https://redmondtowncenter.com/events/"
    region: walk

  # Chateau Ste. Michelle summer concerts — already the source/url for several
  # published articles (Metric, The Fray, Lindsey Stirling), just never formally
  # listed here. Adding it so it shows up in the regular source rotation instead
  # of only being found incidentally via events12.com links.
  - name: "Chateau Ste. Michelle — Summer Concerts"
    type: web
    url: "https://www.ste-michelle.com/concerts/summer-concerts"
    region: eastside
    tags: [music, outdoor]

