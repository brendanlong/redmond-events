name: Build

# Fast "does it build" check for branches and PRs. The deploy workflow runs the
# same build on main; this just keeps non-main work honest before it merges.
on:
  pull_request:
  push:
    branches-ignore: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint:events
      - run: npm run build
